<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro Pro - Versão Final Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: white; padding: 1.2rem; border-radius: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .calendar-day { min-height: 45px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; cursor: pointer; }
        .has-receita { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; font-weight: bold; }
        .has-despesa { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; font-weight: bold; }
        .has-ambos { background-image: linear-gradient(135deg, #dcfce7 50%, #fee2e2 50%) !important; font-weight: bold; }
        .today { border: 2px solid #2563eb !important; text-decoration: underline; }
        
        /* Cores das Categorias */
        .border-mercado { border-left-color: #3b82f6 !important; }
        .border-lazer { border-left-color: #a855f7 !important; }
        .border-saude { border-left-color: #ec4899 !important; }
        .border-transporte { border-left-color: #f97316 !important; }
        .border-essencial { border-left-color: #eab308 !important; }
        .border-outros { border-left-color: #94a3b8 !important; }

        /* Fix para o Input de Arquivo no Celular */
        #importFile {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-gray-800">Minhas Contas 🏠</h1>
        <div class="flex flex-col items-end gap-1">
            <label for="importFile" class="bg-gray-700 text-white text-[10px] font-bold px-3 py-2 rounded-lg shadow-md active:scale-95 cursor-pointer">
                📥 IMPORTAR
            </label>
            <input type="file" id="importFile" accept=".csv,text/csv">
            
            <button type="button" onclick="exportarCSV()" class="bg-blue-600 text-white text-[10px] font-bold px-3 py-2 rounded-lg shadow-md active:scale-95 mt-1">
                📊 EXPORTAR
            </button>
        </div>
    </div>

    <div class="card mb-6">
        <div class="flex justify-between items-center mb-4">
            <button onclick="mudarMes(-1)" class="bg-gray-200 px-3 py-1 rounded-lg font-bold">&lt;</button>
            <h3 id="mes-ano" class="font-bold text-gray-700 capitalize text-sm"></h3>
            <button onclick="mudarMes(1)" class="bg-gray-200 px-3 py-1 rounded-lg font-bold">&gt;</button>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-[9px] font-bold text-gray-400 mb-2">
            <span>DOM</span><span>SEG</span><span>TER</span><span>QUA</span><span>QUI</span><span>SEX</span><span>SÁB</span>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4 text-center">
        <div class="card bg-green-50 border-b-4 border-green-500">
            <p class="text-[10px] text-green-600 font-bold uppercase">Entradas</p>
            <p id="total-receitas" class="text-lg font-bold text-green-700">R$ 0,00</p>
        </div>
        <div class="card bg-red-50 border-b-4 border-red-500">
            <p class="text-[10px] text-red-600 font-bold uppercase">Saídas</p>
            <p id="total-despesas" class="text-lg font-bold text-red-700">R$ 0,00</p>
        </div>
    </div>

    <div class="card bg-blue-50 border-b-4 border-blue-500 mb-4 text-center">
        <p class="text-[10px] text-blue-600 font-bold uppercase">Saldo Acumulado</p>
        <p id="saldo-acumulado" class="text-lg font-bold text-blue-700">R$ 0,00</p>
    </div>

    <div class="mb-6">
        <select id="filtro-categoria" onchange="atualizarApp()" class="w-full border p-2 rounded-lg bg-white text-sm shadow-sm outline-none">
            <option value="todos">Exibir Todas Categorias</option>
            <option value="Mercado">🛒 Mercado</option>
            <option value="Lazer">🎡 Lazer</option>
            <option value="Saude">🏥 Saúde</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Essencial">🏠 Essencial</option>
            <option value="Outros">⚙️ Outros</option>
        </select>
    </div>

    <div id="form-container" class="card mb-6 border-t-4 border-gray-800">
        <input type="hidden" id="edit-id">
        <input type="text" id="desc" placeholder="Descrição" class="w-full border p-3 rounded-lg mb-2 outline-none focus:ring-2 focus:ring-blue-500">
        
        <div class="grid grid-cols-2 gap-2 mb-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Categoria</label>
                <select id="categoria" class="w-full border p-2 rounded-lg text-sm bg-gray-50">
                    <option value="Mercado">🛒 Mercado</option>
                    <option value="Lazer">🎡 Lazer</option>
                    <option value="Saude">🏥 Saúde</option>
                    <option value="Transporte">🚗 Transporte</option>
                    <option value="Essencial">🏠 Essencial</option>
                    <option value="Outros">⚙️ Outros</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Valor R$</label>
                <input type="number" id="valor" step="0.01" class="w-full border p-2 rounded-lg outline-none">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Vencimento</label>
                <input type="date" id="dataVenc" class="w-full border p-2 rounded-lg text-sm">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Status</label>
                <select id="status" class="w-full border p-2 rounded-lg text-sm">
                    <option value="pago">Pago</option>
                    <option value="pendente">Pendente</option>
                </select>
            </div>
        </div>

        <div class="flex gap-2 font-bold">
            <button onclick="salvar('receita')" id="btn-receita" class="flex-1 bg-green-600 text-white py-3 rounded-xl uppercase active:bg-green-700 transition"> + Receita</button>
            <button onclick="salvar('despesa')" id="btn-despesa" class="flex-1 bg-red-600 text-white py-3 rounded-xl uppercase active:bg-red-700 transition">- Despesa</button>
            <button onclick="cancelarEdicao()" id="btn-cancelar" class="hidden flex-1 bg-gray-400 text-white py-3 rounded-xl uppercase">Cancelar</button>
        </div>
    </div>

    <div id="lista" class="space-y-3"></div>

    <script>
        // --- Dados e estado ---
        const STORAGE_KEY = 'finance_app_v5';
        let transacoes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let mesSelecionado = (new Date()).getMonth();
        let anoSelecionado = (new Date()).getFullYear();

        const coresFronteira = {
            'Mercado': 'border-mercado', 'Lazer': 'border-lazer', 'Saude': 'border-saude',
            'Transporte': 'border-transporte', 'Essencial': 'border-essencial', 'Outros': 'border-outros'
        };

        // --- Helpers ---
        function gerarId() {
            return Date.now().toString() + '-' + Math.random().toString(36).slice(2);
        }

        function removerBOM(text) {
            if (text && text.charCodeAt(0) === 0xFEFF) return text.slice(1);
            return text;
        }

        function formatBR(value) {
            return 'R$ ' + Number(value || 0).toFixed(2).replace('.', ',');
        }

        // --- IMPORTAÇÃO (aceita os dois formatos: com e sem Categoria; detecta delimitador e cabeçalho) ---
        const fileInput = document.getElementById('importFile');
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    let text = event.target.result;
                    text = removerBOM(text);
                    const rawLines = text.split(/\r?\n/);
                    // remover linhas vazias do começo/fim
                    const lines = rawLines.map(l => l.trim()).filter((l, idx) => l !== '' || (l === '' && (idx > 0 && idx < rawLines.length - 1)));
                    if (lines.length === 0) {
                        alert('Arquivo vazio ou sem conteúdo válido.');
                        fileInput.value = '';
                        return;
                    }

                    // Detectar delimitador: verificar primeira linha (header)
                    const headerLine = lines[0];
                    let delimiter = ';';
                    const semiCount = (headerLine.match(/;/g) || []).length;
                    const commaCount = (headerLine.match(/,/g) || []).length;
                    if (semiCount === 0 && commaCount > 0) delimiter = ',';
                    // Em muitos CSV exportados pelo Excel, valores podem ter ; e valores numéricos usam vírgula como decimal.
                    // Aqui assumimos separador de colunas como ';' por padrão (mais comum no Brasil), mas detectamos caso seja ','
                    
                    const headers = headerLine.split(delimiter).map(h => h.replace(/(^"|"$)/g,'').trim().toLowerCase());
                    const idxOf = (names) => {
                        for (const n of names) {
                            const i = headers.indexOf(n);
                            if (i !== -1) return i;
                        }
                        return -1;
                    };

                    // Mapeamento flexível por nome de coluna (pt/pt-br sem acento / en)
                    const iDesc = idxOf(['descricao','descrição','desc','description','title']) !== -1 ? idxOf(['descricao','descrição','desc','description','title']) : 0;
                    const iValor = idxOf(['valor','value','amount']) !== -1 ? idxOf(['valor','value','amount']) : 1;
                    const iTipo = idxOf(['tipo','type']) !== -1 ? idxOf(['tipo','type']) : 2;
                    const iData = idxOf(['vencimento','data','date']) !== -1 ? idxOf(['vencimento','data','date']) : 3;
                    const iStatus = idxOf(['status']) !== -1 ? idxOf(['status']) : -1;
                    const iCat = idxOf(['categoria','category','cat']) !== -1 ? idxOf(['categoria','category','cat']) : -1;

                    const imported = [];

                    // ler a partir da segunda linha (após header)
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i];
                        if (!line) continue;
                        // dividir pela vírgula de colunas (delimiter), mas preservar valores entre aspas
                        const cols = parseCSVLine(line, delimiter);
                        // Se poucas colunas, tentar alternativa com ; e com ,
                        if (cols.length < 3) {
                            const altCols1 = parseCSVLine(line, ';');
                            if (altCols1.length > cols.length) {
                                cols.splice(0, cols.length, ...altCols1);
                            } else {
                                const altCols2 = parseCSVLine(line, ',');
                                if (altCols2.length > cols.length) cols.splice(0, cols.length, ...altCols2);
                            }
                        }
                        if (cols.length < 2) continue;

                        const desc = (cols[iDesc] !== undefined ? cols[iDesc] : (cols[0] || '')).trim();
                        const valorRaw = (cols[iValor] !== undefined ? cols[iValor] : (cols[1] || '')).trim();
                        const tipoRaw = (cols[iTipo] !== undefined ? cols[iTipo] : (cols[2] || '')).trim();
                        const dataRaw = (cols[iData] !== undefined ? cols[iData] : (cols[3] || '')).trim();
                        const statusRaw = (iStatus !== -1 && cols[iStatus] !== undefined) ? cols[iStatus].trim() : (cols[4] ? cols[4].trim() : 'pendente');
                        const catRaw = (iCat !== -1 && cols[iCat] !== undefined) ? cols[iCat].trim() : (cols[5] ? cols[5].trim() : 'Outros');

                        // normalizar valor: aceitar formatos 1.234,56 ou 1234.56 / 1234,56
                        let valor = parseFloat(String(valorRaw).replace(/\./g, '').replace(',', '.'));
                        if (isNaN(valor)) valor = 0;

                        const tipo = String(tipoRaw).toLowerCase().includes('receita') || String(tipoRaw).toLowerCase().includes('in') ? 'receita' : 'despesa';

                        // normalizar data: aceitar yyyy-mm-dd ou dd/mm/yyyy
                        let dataVenc = String(dataRaw).trim();
                        if (!dataVenc) {
                            const d = new Date();
                            dataVenc = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        } else if (dataVenc.includes('/')) {
                            const parts = dataVenc.split('/');
                            if (parts.length === 3) {
                                const [d, m, y] = parts;
                                dataVenc = `${y.padStart(4,'0')}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
                            }
                        } else if (!/^\d{4}-\d{2}-\d{2}$/.test(dataVenc)) {
                            // tentar extrair dígitos se estiver em outro formato
                            const m = dataVenc.match(/(\d{4})[^\d]?(\d{2})[^\d]?(\d{2})/);
                            if (m) dataVenc = `${m[1]}-${m[2]}-${m[3]}`;
                            else {
                                const d = new Date();
                                dataVenc = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            }
                        }

                        const status = String(statusRaw || 'pendente').toLowerCase();
                        const categoria = String(catRaw || 'Outros').trim() || 'Outros';

                        imported.push({
                            id: gerarId(),
                            desc,
                            valor,
                            tipo,
                            dataVenc,
                            status,
                            categoria
                        });
                    }

                    if (imported.length === 0) {
                        alert('Nenhuma transação válida encontrada no arquivo.');
                    } else {
                        if (confirm(`Deseja importar ${imported.length} itens?`)) {
                            transacoes = [...transacoes, ...imported];
                            atualizarApp();
                            alert("Dados importados!");
                        }
                    }
                } catch (err) {
                    console.error(err);
                    alert("Erro ao ler o arquivo CSV.");
                } finally {
                    // Reset fundamental para celular
                    fileInput.value = '';
                }
            };
            reader.readAsText(file, "UTF-8");
        });

        // parse de linha CSV simples que respeita aspas (aceita delimitador passado)
        function parseCSVLine(line, delimiter) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                const nch = line[i+1];
                if (ch === '"' ) {
                    if (inQuotes && nch === '"') { // dupla aspas dentro do campo -> literal "
                        current += '"';
                        i++; // pular segunda "
                    } else {
                        inQuotes = !inQuotes;
                    }
                    continue;
                }
                if (ch === delimiter && !inQuotes) {
                    result.push(current);
                    current = '';
                    continue;
                }
                current += ch;
            }
            result.push(current);
            return result.map(s => s.replace(/(^"|"$)/g, '').trim());
        }

        // --- EXPORTAÇÃO ---
        function exportarCSV() {
            if (!transacoes || transacoes.length === 0) return alert("Sem dados.");
            // Cabeçalho fixo (em pt) — inclui Categoria
            let csv = "\uFEFFDescricao;Valor;Tipo;Vencimento;Status;Categoria\n";
            transacoes.forEach(t => {
                const desc = `"${String(t.desc || '').replace(/"/g, '""')}"`;
                const valor = (Number(t.valor || 0)).toFixed(2).replace('.', ',');
                const tipo = t.tipo || 'despesa';
                const dataVenc = t.dataVenc || '';
                const status = t.status || 'pendente';
                const categoria = t.categoria || 'Outros';
                csv += `${desc};${valor};${tipo};${dataVenc};${status};${categoria}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `financeiro_backup.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // --- CRUD (Salvar / Editar / Remover) ---
        function salvar(tipoParam) {
            const idEdit = document.getElementById('edit-id').value;
            const desc = document.getElementById('desc').value.trim();
            const valorInput = document.getElementById('valor').value;
            const valor = parseFloat(String(valorInput).replace(',', '.'));
            const dataVenc = document.getElementById('dataVenc').value;
            const status = document.getElementById('status').value;
            const categoria = document.getElementById('categoria').value;

            if (!desc || isNaN(valor) || !dataVenc) return alert("Preencha todos os campos!");

            if (idEdit) {
                // Atualizar mantendo o tipo original da transação
                const idx = transacoes.findIndex(t => t.id === idEdit);
                if (idx === -1) return alert('Transação não encontrada para edição.');
                const tipoAtual = transacoes[idx].tipo || tipoParam || 'despesa';
                transacoes[idx] = { id: idEdit, desc, valor: Number(valor), tipo: tipoAtual, dataVenc, status, categoria };
            } else {
                const obj = { id: gerarId(), desc, valor: Number(valor), tipo: tipoParam, dataVenc, status, categoria };
                transacoes.push(obj);
            }
            cancelarEdicao();
            atualizarApp();
        }

        function editar(id) {
            const t = transacoes.find(i => i.id === id);
            if (!t) return alert('Transação não encontrada.');
            document.getElementById('edit-id').value = t.id;
            document.getElementById('desc').value = t.desc;
            document.getElementById('valor').value = t.valor;
            document.getElementById('dataVenc').value = t.dataVenc;
            document.getElementById('status').value = t.status;
            document.getElementById('categoria').value = t.categoria || 'Outros';
            document.getElementById('btn-receita').innerText = "ATUALIZAR";
            // Esconder botão despesa para evitar mudar tipo acidentalmente (mantemos o tipo atual)
            document.getElementById('btn-despesa').classList.add('hidden');
            document.getElementById('btn-cancelar').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelarEdicao() {
            document.getElementById('edit-id').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('dataVenc').value = '';
            document.getElementById('status').value = 'pendente';
            document.getElementById('categoria').value = 'Mercado';
            document.getElementById('btn-receita').innerText = "+ Receita";
            document.getElementById('btn-despesa').classList.remove('hidden');
            document.getElementById('btn-cancelar').classList.add('hidden');
        }

        function remover(id) {
            if (confirm("Excluir definitivamente?")) {
                transacoes = transacoes.filter(t => t.id !== id);
                atualizarApp();
            }
        }

        // --- Navegação de mês ---
        function mudarMes(dir) {
            mesSelecionado += dir;
            if (mesSelecionado < 0) { mesSelecionado = 11; anoSelecionado--; }
            else if (mesSelecionado > 11) { mesSelecionado = 0; anoSelecionado++; }
            atualizarApp();
        }

        // --- Atualiza lista, totais e calendário ---
        function atualizarApp() {
            // Persistir
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transacoes));

            const listaDiv = document.getElementById('lista');
            const filtro = document.getElementById('filtro-categoria').value;
            let totalReceitas = 0, totalDespesas = 0, saldoTotal = 0;

            // Calcular saldo acumulado considerando todas as transações
            transacoes.forEach(t => {
                if (t.tipo === 'receita') saldoTotal += Number(t.valor || 0);
                else saldoTotal -= Number(t.valor || 0);
            });

            // Filtrar transações do mês selecionado para exibição/lista
            const transacoesMes = transacoes.filter(t => {
                if (!t.dataVenc) return false;
                const parts = String(t.dataVenc).split('-');
                if (parts.length !== 3) return false;
                const ano = parseInt(parts[0], 10);
                const mes = parseInt(parts[1], 10); // 1..12
                return ano === anoSelecionado && mes === (mesSelecionado + 1);
            });

            const exibicao = transacoesMes.filter(t => filtro === 'todos' || t.categoria === filtro);

            listaDiv.innerHTML = '';
            exibicao.sort((a,b) => new Date(b.dataVenc) - new Date(a.dataVenc)).forEach(t => {
                if (t.tipo === 'receita') totalReceitas += Number(t.valor || 0); else totalDespesas += Number(t.valor || 0);
                const borda = t.tipo === 'receita' ? 'border-green-500' : (coresFronteira[t.categoria] || 'border-outros');
                listaDiv.innerHTML += `
                    <div class="card flex justify-between items-center border-l-8 ${borda} mb-3">
                        <div>
                            <p class="font-bold text-gray-800 text-xs uppercase">${t.desc}</p>
                            <p class="text-[9px] text-gray-400 font-bold">${(t.categoria || 'OUTROS').toUpperCase()} | ${(t.dataVenc || '').split('-').reverse().join('/')}</p>
                            <div class="mt-2 flex gap-4 text-[10px] font-bold uppercase">
                                <button onclick="editar('${t.id}')" class="text-blue-600">Editar</button>
                                <button onclick="remover('${t.id}')" class="text-red-400">Excluir</button>
                                <span class="${t.status === 'pago' ? 'text-green-500' : 'text-orange-500'}">${t.status}</span>
                            </div>
                        </div>
                        <p class="font-black text-sm ${t.tipo === 'receita' ? 'text-green-600' : 'text-red-600'}">${formatBR(t.valor)}</p>
                    </div>`;
            });

            document.getElementById('total-receitas').innerText = formatBR(totalReceitas);
            document.getElementById('total-despesas').innerText = formatBR(totalDespesas);
            document.getElementById('saldo-acumulado').innerText = formatBR(saldoTotal);

            gerarCalendario();
        }

        // --- Gera calendário do mês selecionado ---
        function gerarCalendario() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            document.getElementById('mes-ano').innerText = new Date(anoSelecionado, mesSelecionado).toLocaleString('pt-br', { month: 'long', year: 'numeric' });
            const prim = new Date(anoSelecionado, mesSelecionado, 1).getDay();
            const ult = new Date(anoSelecionado, mesSelecionado + 1, 0).getDate();
            // Preencher dias vazios do começo do mês
            for (let i = 0; i < prim; i++) grid.innerHTML += `<div></div>`;
            for (let dia = 1; dia <= ult; dia++) {
                const dt = `${anoSelecionado}-${String(mesSelecionado + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const movs = transacoes.filter(t => t.dataVenc === dt);
                let cl = "";
                if (movs.length > 0) {
                    const hasRec = movs.some(m => m.tipo === 'receita');
                    const hasDes = movs.some(m => m.tipo === 'despesa');
                    cl = hasRec && hasDes ? "has-ambos" : (hasRec ? "has-receita" : (hasDes ? "has-despesa" : ""));
                }
                // marcar hoje (apenas visual)
                const hoje = new Date();
                const ehHoje = hoje.getFullYear() === anoSelecionado && (hoje.getMonth() === mesSelecionado) && (hoje.getDate() === dia);
                const todayClass = ehHoje ? ' today' : '';
                grid.innerHTML += `<div class="calendar-day ${cl}${todayClass}" onclick="document.getElementById('dataVenc').value='${dt}'">${dia}</div>`;
            }
        }

        // Inicialização
        window.onload = atualizarApp;
    </script>
</body>
</html>
